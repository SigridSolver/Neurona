<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- Connection Lines -->
  <line x1="150" y1="70" x2="226" y2="125" stroke="#00a2c2" stroke-width="2" />
  <line x1="226" y1="125" x2="197" y2="215" stroke="#00a2c2" stroke-width="2" />
  <line x1="197" y1="215" x2="103" y2="215" stroke="#00a2c2" stroke-width="2" />
  <line x1="103" y1="215" x2="74" y2="125" stroke="#00a2c2" stroke-width="2" />
  <line x1="74" y1="125" x2="150" y2="70" stroke="#00a2c2" stroke-width="2" />

  <!-- House Nodes -->
  <!-- House III (Top) -->
  <circle cx="150" cy="70" r="22" fill="#ffffff" stroke="#00a2c2" stroke-width="2" />
  <text x="150" y="70" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">III</text>

  <!-- House II (Left-Top) -->
  <circle cx="74" cy="125" r="22" fill="#ffffff" stroke="#00a2c2" stroke-width="2" />
  <text x="74" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">II</text>

  <!-- House IV (Right-Top) -->
  <circle cx="226" cy="125" r="22" fill="#ffffff" stroke="#00a2c2" stroke-width="2" />
  <text x="226" y="125" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">IV</text>

  <!-- House I (Bottom-Left) -->
  <circle cx="103" cy="215" r="22" fill="#ffffff" stroke="#00a2c2" stroke-width="2" />
  <text x="103" y="215" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">I</text>

  <!-- House V (Bottom-Right) -->
  <circle cx="197" cy="215" r="22" fill="#ffffff" stroke="#00a2c2" stroke-width="2" />
  <text x="197" y="215" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#000000" text-anchor="middle" dominant-baseline="central">V</text>
</svg>
