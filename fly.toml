app = "neurona-saber11"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/saber11.db"

[mounts]
  source = "neurona_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
